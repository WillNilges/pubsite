{{ define "main" }}  
{{ .Content }}  
{{ range ( where .Site.RegularPages "Type" "blog" ) }}
<div class="postLineItem">
    <div class="postTitle">
        <a class="nakedLink" href="{{ .Permalink }}">{{ .Title }}</a>
    </div>
    <div class="postDate">
        {{ .Date.Format "2006-01-02" }}
    </div>
</div>
{{end}}
{{ end }}
