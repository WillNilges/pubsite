{{ define "main" }}  
<!--For a blog post-->
    <h1>{{ .Title }}</h1>
    {{ if in .Params.categories "Blog" }}
    <h3>
        <time>{{ .PublishDate.Format "2006-01-02" }}</time> | {{ .ReadingTime }} minute read  
    </h3>
    {{ else if in .Params.categories "Project" }}
    <p>Circa <time>{{ .PublishDate.Format "2006" }}</time>
    {{ end }}
    {{ .Content }}  
{{ end }}
